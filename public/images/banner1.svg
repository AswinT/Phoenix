<svg width="600" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#262626;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#404040;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bg)" rx="16"/>
  
  <!-- Headphone Icon -->
  <g transform="translate(300,200)">
    <!-- Headband -->
    <path d="M -60 -40 Q 0 -80 60 -40" stroke="#ffffff" stroke-width="8" fill="none" stroke-linecap="round"/>
    
    <!-- Left ear cup -->
    <circle cx="-50" cy="0" r="30" fill="#ffffff" opacity="0.9"/>
    <circle cx="-50" cy="0" r="20" fill="#000000"/>
    
    <!-- Right ear cup -->
    <circle cx="50" cy="0" r="30" fill="#ffffff" opacity="0.9"/>
    <circle cx="50" cy="0" r="20" fill="#000000"/>
    
    <!-- Connecting wires -->
    <path d="M -50 -30 Q -50 -50 0 -50 Q 50 -50 50 -30" stroke="#ffffff" stroke-width="4" fill="none"/>
  </g>
  
  <!-- Text -->
  <text x="300" y="320" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="24" font-weight="bold">Premium Headphones</text>
  <text x="300" y="350" text-anchor="middle" fill="#d4d4d4" font-family="Arial, sans-serif" font-size="16">Experience Superior Sound Quality</text>
</svg>
